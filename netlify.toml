[build]
  command = "npm run build"
  publish = "dist"

# SPA redirect — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Only set specific headers for specific files
[[headers]]
  for = "/src/*.jsx"
  [headers.values]
    Content-Type = "text/javascript"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

# Don't override the favicon
# Let Netlify handle it automatically