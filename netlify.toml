[build]
  command = "npm run build"
  publish = "dist"

# 301 redirects for old/removed pages
[[redirects]]
  from = "/VarunaCase"
  to = "/"
  status = 301

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/UXCase"
  to = "/"
  status = 301

[[redirects]]
  from = "/OrchardCase"
  to = "/"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/"
  status = 301

# SPA catch-all — Netlify serves real files first, this only fires for unknown paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers
[[headers]]
  for = "/analytics.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"